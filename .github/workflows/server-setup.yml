

name: Server Setup

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SwiftProPDF Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            sudo apt update

            sudo apt install -y \
              python3 \
              python3-full \
              python3-pip \
              python3-venv \
              git \
              nginx \
              libreoffice \
              certbot \
              python3-certbot-nginx

            if [ ! -d "$HOME/SwiftProPDF" ]; then
              git clone https://github.com/pundlamahesh/SwiftProPDF.git "$HOME/SwiftProPDF"
            fi
            cd "$HOME/SwiftProPDF"
            git fetch origin
            git reset --hard origin/main

            if [ ! -d "$HOME/venv" ]; then
              python3 -m venv "$HOME/venv"
            fi

            source "$HOME/venv/bin/activate"

            cd "$HOME/SwiftProPDF"

            pip install --upgrade pip
            pip install gunicorn
            pip install -e .

            # Copy systemd service
            sudo cp "$HOME/SwiftProPDF/deploy/swiftpropdf.service" /etc/systemd/system/swiftpropdf.service

            # Copy nginx config
            sudo cp "$HOME/SwiftProPDF/deploy/nginx.conf" /etc/nginx/sites-available/swiftpropdf

            # Enable nginx site
            sudo ln -sf /etc/nginx/sites-available/swiftpropdf /etc/nginx/sites-enabled/swiftpropdf

            # Remove default nginx site
            sudo rm -f /etc/nginx/sites-enabled/default

            # Reload systemd
            sudo systemctl daemon-reload

            # Validate and start nginx
            sudo nginx -t
            sudo systemctl enable nginx
            sudo systemctl reload nginx || sudo systemctl restart nginx
            cat > "$HOME/SwiftProPDF/.env" << EOF
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            SMTP_SERVER=${{ secrets.SMTP_SERVER }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            SENDER_EMAIL=${{ secrets.SENDER_EMAIL }}
            EOF

            chmod 600 "$HOME/SwiftProPDF/.env"

            sudo systemctl enable swiftpropdf
            sudo systemctl restart swiftpropdf

            sleep 10

            sudo systemctl status swiftpropdf --no-pager
            sudo systemctl status nginx --no-pager