name: Server Setup

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo apt update

            sudo apt install -y \
              python3 \
              python3-pip \
              python3-venv \
              git \
              nginx \
              libreoffice \
              certbot \
              python3-certbot-nginx

            if [ ! -d "$HOME/SwiftPDF" ]; then
              git clone https://github.com/pundlamahesh/SwiftPDF.git $HOME/SwiftPDF
            fi

            if [ ! -d "$HOME/venv" ]; then
              python3 -m venv $HOME/venv
            fi

            source $HOME/venv/bin/activate

            cd $HOME/SwiftPDF

            pip install --upgrade pip
            pip install -e .
            pip install gunicorn
