<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register | SwiftProPDF</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card">
            <div class="auth-brand">
                <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="SwiftProPDF" class="logo">
                <span>SwiftProPDF</span>
            </div>

            <div class="auth-heading">
                <h1>Create account</h1>
                <p>Register to access the PDF tools dashboard. Use 8+ characters with uppercase, lowercase, and a number.</p>
            </div>

            {% if error %}
            <div class="alert" role="alert">{{ error }}</div>
            {% endif %}

            <form class="auth-form" action="{{ url_for('register') }}" method="post">
                <div class="field-row">
                    <label class="field">
                        <span>First name</span>
                        <input type="text" name="first_name" value="{{ first_name or '' }}" autocomplete="given-name" required autofocus>
                    </label>

                    <label class="field">
                        <span>Last name</span>
                        <input type="text" name="last_name" value="{{ last_name or '' }}" autocomplete="family-name" required>
                    </label>
                </div>

                <label class="field">
                    <span>Email</span>
                    <input type="email" name="email" value="{{ email or '' }}" autocomplete="email" required>
                </label>

                <label class="field">
                    <span>Password</span>
                    <input type="password" name="password" autocomplete="new-password" required>
                </label>

                <label class="field">
                    <span>Confirm password</span>
                    <input type="password" name="confirm_password" autocomplete="new-password" required>
                </label>

                <div class="auth-section-heading">
                    <span class="eyebrow">Step 2</span>
                    <h2>Security Verification</h2>
                </div>

                <label class="field">
                    <span>Date of Birth</span>
                    <input type="date" name="date_of_birth" value="{{ date_of_birth or '' }}" required>
                </label>

                <label class="field">
                    <span>Which city are you currently living in?</span>
                    <input type="text" name="current_city" value="{{ current_city or '' }}" autocomplete="address-level2" required>
                </label>

                <button class="primary-action" type="submit">Create Account</button>
            </form>

            <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
        </section>
    </main>
</body>
</html>
