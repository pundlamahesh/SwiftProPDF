<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password | SwiftProPDF</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    {% if not user or user.is_free %}
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1377318505497346"
        crossorigin="anonymous"></script>
    {% endif %}
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card">
            <div class="auth-brand">
                <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="SwiftProPDF" class="logo">
                <span>SwiftProPDF</span>
            </div>

            <div class="auth-heading">
                <h1>Set new password</h1>
                <p>Enter the 6-digit code sent to {{ email }}, then choose a new password.</p>
            </div>

            {% if error %}
            <div class="alert" role="alert">{{ error }}</div>
            {% endif %}

            <form class="auth-form" action="{{ url_for('reset_password') }}" method="post">
                <label class="field">
                    <span>Reset code</span>
                    <input class="otp-input" type="text" name="otp" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" required autofocus>
                </label>

                <label class="field">
                    <span>New password</span>
                    <input type="password" name="password" autocomplete="new-password" required>
                </label>

                <label class="field">
                    <span>Confirm password</span>
                    <input type="password" name="confirm_password" autocomplete="new-password" required>
                </label>

                <button class="primary-action" type="submit">Reset Password</button>
            </form>

            <p class="auth-switch">Need a new code? <a href="{{ url_for('forgot_password') }}">Send again</a></p>
        </section>
    </main>
</body>
</html>
