<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verify Email | SwiftProPDF</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card">
            <div class="auth-brand">
                <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="SwiftProPDF" class="logo">
                <span>SwiftProPDF</span>
            </div>

            <div class="auth-heading">
                <h1>Verify email</h1>
                <p>Enter the 6-digit code sent to {{ email }} to finish creating your account.</p>
            </div>

            {% if error %}
            <div class="alert" role="alert">{{ error }}</div>
            {% endif %}

            <form class="auth-form" action="{{ url_for('verify_registration') }}" method="post">
                <label class="field">
                    <span>Verification code</span>
                    <input class="otp-input" type="text" name="otp" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" required autofocus>
                </label>

                <button class="primary-action" type="submit">Verify</button>
            </form>

            <p class="auth-switch">Need a new code? <a href="{{ url_for('register') }}">Register again</a></p>
        </section>
    </main>
</body>
</html>
