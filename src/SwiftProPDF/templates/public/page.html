{% extends "layouts/base.html" %}

{% block title %}{{ page.title }} | SwiftProPDF{% endblock %}
{% block meta_description %}{{ page.description }}{% endblock %}

{% block content %}
<section class="simple-page">
    <div class="container">
        <span class="eyebrow">{{ page.label }}</span>
        <h1>{{ page.title }}</h1>
        <p class="section-lead">{{ page.description }}</p>
        <div class="page-copy">
            {{ page.content|safe }}
        </div>
    </div>
</section>
{% endblock %}
