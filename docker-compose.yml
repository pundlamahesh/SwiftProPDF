services:
  swiftpdf:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swiftpdf
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - swiftpdf-instance:/app/src/SwiftPDF/instance
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  swiftpdf-instance:
